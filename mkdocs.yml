site_name: 'CBIcall Documentation'
site_description: 'CBIcall: CNAG Biomedical Informatics framework for variant Calling' 
site_author: 'Manuel Rueda, PhD'
copyright: '&copy; Copyright 2025-2026, Manuel Rueda, CNAG'
repo_name: 'CBIcall'
repo_url: https://github.com/CNAG-Biomedical-Informatics/cbicall
edit_uri: edit/main/docs/
extra_css:
  - css/theme_overrides.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js
  - js/vendor/katex.js               # your KaTeX init AFTER the libs
  - js/theme_overrides.js            # Custom tweaks last

plugins:
  - search
  - include-markdown
  - macros
  - table-reader
  - mermaid2:
      arguments:
        startOnLoad: true

markdown_extensions:
    - toc:
        toc_depth: 2-3
        permalink: true
    - admonition
    - attr_list
    - footnotes
    - md_in_html
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.details
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.tilde
    - pymdownx.saneheaders
    - pymdownx.magiclink:
        hide_protocol: true
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.tasklist:
        custom_checkbox: true
    - tables
    - mdx_gh_links:
        user: CNAG-Biomedical-Informatics
        repo: cbicall
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets:
        base_path: ["docs", "non-containerized", "docker", "apptainer", "ex", "share", "nb"]
        url_download: true
    - pymdownx.superfences:
        custom_fences:
            - name: mermaid
              class: mermaid
              format: !!python/name:mermaid2.fence_mermaid
    - pymdownx.arithmatex:
        generic: true

nav:
  - "🏠 Home": index.md

  - "⬇️ Installation":
      - "🐳 Docker": installation/docker.md
      - "🖥️ HPC (Apptainer / Singularity)": installation/apptainer.md
      - "🛠️  Non-containerized": installation/non-containerized.md

  - "🚀 Getting Started":
    - "🧭 Choose Your Path": usage/choose-your-path.md
    - "⚡ Quickstart": usage/quickstart.md
    - "🧪 End-to-end Example (WES)": usage/end-to-end-example-wes.md
    - "🧬 End-to-end Example (mtDNA)": usage/end-to-end-example-mit.md
    - "📘 General Usage": usage/usage.md

  - "🧪 Pipelines":
      - "🔬 WES WGS Single":  pipelines/wes-wgs-single.md
      - "🧫 WES WGS Cohort": pipelines/wes-wgs-cohort.md
      - "🧬 mtDNA": pipelines/mtdna.md

  - "🔧 Technical Details":
      - "🏗️ Architecture": technical-details/architecture.md
      - "🧱 Adding a Pipeline": technical-details/adding-a-pipeline.md

  - "❓ Help & Reference":
      - "🏷️ Naming Conventions": help/naming-conventions.md
      - "⚙️ Performance": help/performance.md
      - "🐛 Troubleshooting": help/troubleshooting.md
      - "🤔 FAQ": help/faq.md

  - "ℹ️ About":
      - "👤 About": about/about.md
      - "📄 Citation": about/citation.md

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: dark)'
      scheme: default
      primary: blue grey
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode
  logo: img/cbicall-logo.png
  icon:
    repo: fontawesome/brands/github-alt
  features:
    - content.code.select
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.share
    - navigation.tracking
    - navigation.sections
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CNAG-Biomedical-Informatics

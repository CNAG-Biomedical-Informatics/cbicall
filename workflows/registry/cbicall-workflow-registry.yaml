workflows:
  bash:
    base_dir: "workflows/bash"
    versions:
      gatk-3.5:
        helpers:
          env: "env.sh"
          coverage: "coverage.sh"
          jaccard: "jaccard.sh"
          vcf2sex: "vcf2sex.sh"
          vcf2hash: "vcf2hash.sh"
        profiles:
          cnag-hpc:
            env: "cnag-hpc-env.sh"
        pipelines:
          wes:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wes_single.sh"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wes_cohort.sh"
          mit:
            single:
              default: "v1"
              versions:
                v1:
                  script: "mit_single.sh"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "mit_cohort.sh"

      gatk-4.6:
        helpers:
          env: "env.sh"
          coverage: "coverage.sh"
          jaccard: "jaccard.sh"
          vcf2sex: "vcf2sex.sh"
          vcf2hash: "vcf2hash.sh"
        profiles:
          cnag-hpc:
            env: "cnag-hpc-env.sh"
        pipelines:
          wes:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wes_single.sh"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wes_cohort.sh"
          wgs:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wgs_single.sh"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wgs_cohort.sh"

  snakemake:
    base_dir: "workflows/snakemake"
    versions:
      gatk-4.6:
        helpers:
          config: "config.yaml"
        pipelines:
          wes:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wes_single.smk"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wes_cohort.smk"
          wgs:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wgs_single.smk"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wgs_cohort.smk"

  nextflow:
    base_dir: "workflows/nextflow"
    versions:
      gatk-4.6:
        helpers:
          config: "config.yaml"
          coverage: "../../bash/gatk-4.6/coverage.sh"
          vcf2sex: "../../bash/gatk-4.6/vcf2sex.sh"
          vcf2hash: "../../bash/gatk-4.6/vcf2hash.sh"
        pipelines:
          wes:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wes_wgs_single.nf"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wes_wgs_cohort.nf"
          wgs:
            single:
              default: "v1"
              versions:
                v1:
                  script: "wes_wgs_single.nf"
            cohort:
              default: "v1"
              versions:
                v1:
                  script: "wes_wgs_cohort.nf"

      nf-core:
        pipelines:
          demo:
            single:
              default: "v1"
              versions:
                v1:
                  source_type: "nf-core"
                  source: "nf-core/demo"
                  release: "1.1.0"
                  default_outdir: "demo"
          sarek:
            cohort:
              default: "v1"
              versions:
                v1:
                  source_type: "nf-core"
                  source: "nf-core/sarek"
                  release: "3.8.1"
                  default_outdir: "sarek"
                  canonical_outputs:
                    - name: "haplotypecaller_vcf"
                      type: "vcf"
                      pattern: "variant_calling/haplotypecaller/*/*.haplotypecaller.vcf.gz"

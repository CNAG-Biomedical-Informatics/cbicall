name: Publish to PyPI

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out release
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build,test]"
          pytest
          version=$(python -c "from cbicall import __version__; print(__version__)")
          tag=${GITHUB_REF_NAME#v}
          test "$tag" = "$version" || { echo "Release tag $GITHUB_REF_NAME does not match package version $version"; exit 1; }
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/cbicall-wheel-test
          /tmp/cbicall-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/cbicall-wheel-test/bin/cbicall --version
          /tmp/cbicall-wheel-test/bin/cbicall validate-registry
          /tmp/cbicall-wheel-test/bin/cbicall demo --output-dir /tmp/cbicall-demo
          test -s /tmp/cbicall-demo/wes/run-report.html
          test -s /tmp/cbicall-demo/mtdna/02_browser/CNAG99901P.html

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cbicall
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

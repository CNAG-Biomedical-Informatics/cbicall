name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out release
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build,test]"

      - name: Run tests with coverage gate
        run: pytest

      - name: Verify release version
        run: |
          package_version=$(python -c "from cbicall import __version__; print(__version__)")
          metadata_version=$(python -c "from importlib.metadata import version; print(version('cbicall'))")
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag" || {
            echo "Release tag $GITHUB_REF_NAME must be annotated"
            exit 1
          }
          test "$(git rev-parse "refs/tags/${GITHUB_REF_NAME}^{commit}")" = "$(git rev-parse HEAD)" || {
            echo "Checked-out commit does not match release tag $GITHUB_REF_NAME"
            exit 1
          }
          python -c 'import re, sys; version = sys.argv[1]; sys.exit(0 if re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version) else f"Production version must be stable X.Y.Z, got {version}")' "$package_version"
          test "$GITHUB_REF_NAME" = "v$package_version" || {
            echo "Release tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          }
          test "$metadata_version" = "$package_version" || {
            echo "Distribution version $metadata_version does not match package version $package_version"
            exit 1
          }
          grep -Fq "## $package_version -" CHANGELOG.md || {
            echo "CHANGELOG.md has no dated entry for $package_version"
            exit 1
          }

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m venv /tmp/cbicall-wheel-test
          /tmp/cbicall-wheel-test/bin/python -m pip install dist/*.whl
          cd /tmp
          test "$(/tmp/cbicall-wheel-test/bin/cbicall --version)" = "${GITHUB_REF_NAME#v}"
          /tmp/cbicall-wheel-test/bin/cbicall validate-registry
          /tmp/cbicall-wheel-test/bin/cbicall demo --output-dir /tmp/cbicall-demo
          test -s /tmp/cbicall-demo/wes/run-report.html
          test -s /tmp/cbicall-demo/mtdna/02_browser/CNAG99901P.html

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cbicall
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

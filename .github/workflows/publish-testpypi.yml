name: Publish to TestPyPI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Verify source branch
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "TestPyPI prereleases must be dispatched from main"
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build,test]"

      - name: Verify prerelease version
        run: |
          version=$(python -c "from cbicall import __version__; print(__version__)")
          python -c 'from packaging.version import Version; import sys; version = Version(sys.argv[1]); sys.exit(0 if version.is_prerelease or version.is_devrelease else f"TestPyPI version must be a prerelease, got {version}")' "$version"

      - name: Run tests with coverage gate
        run: pytest

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Test the built wheel
        working-directory: /tmp
        run: |
          python -m venv cbicall-testpypi-wheel-test
          cbicall-testpypi-wheel-test/bin/python -m pip install "$GITHUB_WORKSPACE"/dist/*.whl
          cbicall-testpypi-wheel-test/bin/cbicall --version
          cbicall-testpypi-wheel-test/bin/cbicall validate-registry
          cbicall-testpypi-wheel-test/bin/cbicall demo --output-dir /tmp/cbicall-testpypi-demo
          test -s /tmp/cbicall-testpypi-demo/wes/run-report.html
          test -s /tmp/cbicall-testpypi-demo/mtdna/02_browser/CNAG99901P.html

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/cbicall
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

name: Docker build

on:
  workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read build metadata
        id: build_metadata
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            CBICALL_VERSION=${{ steps.build_metadata.outputs.version }}
            VCS_REF=${{ steps.build_metadata.outputs.revision }}
          tags: |
            manuelrueda/cbicall:${{ steps.build_metadata.outputs.version }}
            manuelrueda/cbicall:latest
          platforms: linux/amd64,linux/arm64

name: Build and test

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "ubuntu-latest", "macos-latest" ]
        python-version: [ "3.8", "3.10", "3.12", "3.14" ]
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests (no coverage upload)
        run: |
          pytest

      - name: Run tests with coverage (for Coveralls)
        if: matrix.python-version == '3.10' && matrix.os == 'ubuntu-latest'
        run: |
          pytest --cov=cbicall --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.10' && matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          format: cobertura
          file: coverage.xml

  package:
    runs-on: ubuntu-latest
    name: Build and inspect distributions
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"
          python -m build
          python -m twine check dist/*

      - name: Verify installed wheel and packaged runtime assets
        run: |
          python -m pip install --no-deps --target /tmp/cbicall-wheel dist/*.whl
          cd /tmp
          PYTHONPATH=/tmp/cbicall-wheel python -m cbicall --version
          PYTHONPATH=/tmp/cbicall-wheel python -m cbicall validate-registry
          PYTHONPATH=/tmp/cbicall-wheel python -m cbicall validate-resources
          PYTHONPATH=/tmp/cbicall-wheel python -m cbicall install-resources --help >/dev/null
          PYTHONPATH=/tmp/cbicall-wheel python -m cbicall demo --output-dir /tmp/cbicall-demo
          test -s /tmp/cbicall-demo/wes/run-report.html
          test -s /tmp/cbicall-demo/mtdna/02_browser/CNAG99901P.html
          PYTHONPATH=/tmp/cbicall-wheel python - <<'PY'
          from cbicall.integration_tests import prepare_integration_root
          from cbicall.paths import runtime_root

          root = runtime_root()
          staged, temporary = prepare_integration_root(root)
          assert temporary == staged
          assert (root / "browser" / "mtb2html.py").is_file()
          assert (root / "browser" / "mtb2json.py").is_file()
          assert (staged / "examples" / "input" / "param.yaml").is_file()
          assert (staged / "mtdna" / "MToolBox_config.sh").is_file()
          assert (staged / "workflows" / "registry" / "cbicall-workflow-registry.yaml").is_file()
          PY

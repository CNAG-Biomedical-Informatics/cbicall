<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">WGS Run Time vs Number of Threads</title>
  <desc id="desc">Line chart showing WGS single-mode runtime decreasing from an assumed 70.0 hours at 4 threads to 63.45 hours at 8 threads and 60.0 hours at 12 threads.</desc>
  <rect width="960" height="540" fill="#fff"/>

  <style>
    .title { font: 32px Arial, Helvetica, sans-serif; fill: #333; }
    .axis-title { font: 22px Arial, Helvetica, sans-serif; fill: #222; }
    .tick { font: 20px Arial, Helvetica, sans-serif; fill: #222; }
    .grid { stroke: #c8c8c8; stroke-width: 1.4; stroke-dasharray: 5 4; }
    .axis { stroke: #222; stroke-width: 2.2; }
    .line { fill: none; stroke: #2f80ed; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .point { fill: #2f80ed; stroke: #2f80ed; stroke-width: 2; }
    .value { font: 16px Arial, Helvetica, sans-serif; fill: #555; }
  </style>

  <text x="480" y="42" text-anchor="middle" class="title">WGS Run Time vs Number of Threads</text>

  <!-- Plot area: x 90..900, y 76..424. X range 4..12, Y range 30..75 hours. -->
  <g aria-hidden="true">
    <line x1="90" y1="424" x2="920" y2="424" class="grid"/>
    <line x1="90" y1="366" x2="920" y2="366" class="grid"/>
    <line x1="90" y1="308" x2="920" y2="308" class="grid"/>
    <line x1="90" y1="250" x2="920" y2="250" class="grid"/>
    <line x1="90" y1="192" x2="920" y2="192" class="grid"/>
    <line x1="90" y1="134" x2="920" y2="134" class="grid"/>
    <line x1="90" y1="76" x2="920" y2="76" class="grid"/>

    <line x1="90" y1="76" x2="90" y2="424" class="grid"/>
    <line x1="495" y1="76" x2="495" y2="424" class="grid"/>
    <line x1="900" y1="76" x2="900" y2="424" class="grid"/>
  </g>

  <line x1="90" y1="76" x2="90" y2="424" class="axis"/>
  <line x1="90" y1="424" x2="920" y2="424" class="axis"/>

  <g class="tick" text-anchor="middle">
    <text x="90" y="454">4</text>
    <text x="495" y="454">8</text>
    <text x="900" y="454">12</text>
  </g>

  <g class="tick" text-anchor="end">
    <text x="76" y="430">30</text>
    <text x="76" y="372">37.5</text>
    <text x="76" y="314">45</text>
    <text x="76" y="256">52.5</text>
    <text x="76" y="198">60</text>
    <text x="76" y="140">67.5</text>
    <text x="76" y="82">75</text>
  </g>

  <text x="505" y="500" text-anchor="middle" class="axis-title">Number of Threads</text>
  <text x="34" y="244" text-anchor="middle" transform="rotate(-90 34 244)" class="axis-title">Run Time (hours)</text>

  <polyline class="line" points="90,115 495,166 900,192"/>

  <g>
    <circle cx="90" cy="115" r="6" class="point"/>
    <circle cx="495" cy="166" r="6" class="point"/>
    <circle cx="900" cy="192" r="6" class="point"/>
    <text x="120" y="119" text-anchor="start" class="value">70.0 h</text>
    <text x="495" y="148" text-anchor="middle" class="value">63.45 h</text>
    <text x="900" y="174" text-anchor="middle" class="value">60.0 h</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">WES/WGS cohort joint-genotyping workflow</title>
  <desc id="desc">Workflow from per-sample gVCFs through GenomicsDB, joint genotyping, optional VQSR, hard filtering, and final cohort QC VCF.</desc>
  <rect width="1040" height="500" rx="18" fill="#f8fafc"/>
  <style>
    .label{font:600 16px Arial,Helvetica,sans-serif;fill:#1f2937}
    .small{font:13px Arial,Helvetica,sans-serif;fill:#475569}
    .box{fill:#fff;stroke:#cbd5e1;stroke-width:2}
    .data{fill:#ecfdf5;stroke:#10b981}
    .decision{fill:#fff7ed;stroke:#f59e0b}
    .final{fill:#eff6ff;stroke:#2563eb}
    .line{fill:none;stroke:#64748b;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
    .dash{fill:none;stroke:#f59e0b;stroke-width:2.4;stroke-dasharray:6 5;stroke-linecap:round}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="520" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="700" fill="#0f172a">WES/WGS Cohort Joint Genotyping</text>
  <text x="520" y="70" text-anchor="middle" class="small">Per-sample gVCFs to a final joint cohort VCF</text>

  <g transform="translate(70 118)">
    <rect class="data" x="0" y="0" width="155" height="72" rx="10"/>
    <text class="label" x="77.5" y="28" text-anchor="middle">Sample map</text>
    <text class="small" x="77.5" y="52" text-anchor="middle">gVCF paths</text>

    <rect class="box" x="205" y="0" width="170" height="72" rx="10"/>
    <text class="label" x="290" y="28" text-anchor="middle">GenomicsDB</text>
    <text class="small" x="290" y="52" text-anchor="middle">import workspace</text>

    <rect class="box" x="425" y="0" width="170" height="72" rx="10"/>
    <text class="label" x="510" y="28" text-anchor="middle">GenotypeGVCFs</text>
    <text class="small" x="510" y="52" text-anchor="middle">cohort raw VCF</text>

    <rect class="decision" x="645" y="0" width="170" height="72" rx="10"/>
    <text class="label" x="730" y="26" text-anchor="middle">Variant counts</text>
    <text class="small" x="730" y="50" text-anchor="middle">SNP / INDEL thresholds</text>

    <path class="line" marker-end="url(#arrow)" d="M155 36 H201"/>
    <path class="line" marker-end="url(#arrow)" d="M375 36 H421"/>
    <path class="line" marker-end="url(#arrow)" d="M595 36 H641"/>
  </g>

  <g transform="translate(190 280)">
    <rect class="decision" x="0" y="0" width="165" height="72" rx="10"/>
    <text class="label" x="82.5" y="28" text-anchor="middle">SNP VQSR</text>
    <text class="small" x="82.5" y="52" text-anchor="middle">if enough SNPs</text>

    <rect class="decision" x="215" y="0" width="165" height="72" rx="10"/>
    <text class="label" x="297.5" y="28" text-anchor="middle">INDEL VQSR</text>
    <text class="small" x="297.5" y="52" text-anchor="middle">if enough INDELs</text>

    <rect class="box" x="430" y="0" width="165" height="72" rx="10"/>
    <text class="label" x="512.5" y="28" text-anchor="middle">Hard filters</text>
    <text class="small" x="512.5" y="52" text-anchor="middle">QC filtering</text>

    <rect class="final" x="645" y="0" width="165" height="72" rx="10"/>
    <text class="label" x="727.5" y="28" text-anchor="middle">Cohort QC VCF</text>
    <text class="small" x="727.5" y="52" text-anchor="middle">recommended</text>

    <path class="line" marker-end="url(#arrow)" d="M165 36 H211"/>
    <path class="line" marker-end="url(#arrow)" d="M380 36 H426"/>
    <path class="line" marker-end="url(#arrow)" d="M595 36 H641"/>
  </g>

  <path class="dash" marker-end="url(#arrowOrange)" d="M800 190 C716 230 432 242 282 278"/>
  <path class="dash" marker-end="url(#arrowOrange)" d="M810 190 C734 238 584 248 498 278"/>
  <path class="line" marker-end="url(#arrow)" d="M580 190 C646 232 676 250 690 278"/>
</svg>

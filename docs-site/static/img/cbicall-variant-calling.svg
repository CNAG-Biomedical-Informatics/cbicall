<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-labelledby="title description">
  <title id="title">Variant calling from sequencing reads</title>
  <desc id="description">Paired sequencing reads are aligned to a genomic reference. Consistent base differences form variant evidence and are reported in an analysis-ready VCF.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#78909b"/>
    </marker>
    <clipPath id="documentClip">
      <path d="M946 50h152l42 42v198H946Z"/>
    </clipPath>
  </defs>

  <rect width="1200" height="380" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="52" y="32" fill="#49616c" font-size="13" font-weight="700">PAIRED-END FASTQ</text>
    <text x="386" y="32" fill="#49616c" font-size="13" font-weight="700">ALIGNED READ PILEUP (BAM)</text>
    <text x="946" y="32" fill="#49616c" font-size="13" font-weight="700">FILTERED VCF</text>

    <!-- Directional read pairs connected by their inferred inserts -->
    <g font-family="Arial, sans-serif">
      <g font-size="11" font-weight="700">
        <rect x="54" y="53" width="28" height="18" rx="3" fill="#dcecf1" stroke="#0f7897"/>
        <text x="68" y="66" fill="#0f7897" text-anchor="middle">R1</text>
        <rect x="91" y="53" width="28" height="18" rx="3" fill="#e5f2e9" stroke="#35a878"/>
        <text x="105" y="66" fill="#277b59" text-anchor="middle">R2</text>
      </g>

      <g stroke="#9cb0b8" stroke-width="2" stroke-dasharray="4 4">
        <line x1="145" y1="105" x2="231" y2="105"/>
        <line x1="157" y1="166" x2="220" y2="166"/>
        <line x1="134" y1="227" x2="243" y2="227"/>
        <line x1="164" y1="288" x2="226" y2="288"/>
      </g>

      <g fill="#dcecf1" stroke="#0f7897" stroke-width="1.5">
        <path d="M54 93h79l14 12-14 12H54Z"/>
        <path d="M66 154h79l14 12-14 12H66Z"/>
        <path d="M44 215h78l14 12-14 12H44Z"/>
        <path d="M73 276h79l14 12-14 12H73Z"/>
      </g>
      <g fill="#e5f2e9" stroke="#35a878" stroke-width="1.5">
        <path d="M322 93h-79l-14 12 14 12h79Z"/>
        <path d="M310 154h-79l-14 12 14 12h79Z"/>
        <path d="M332 215h-78l-14 12 14 12h78Z"/>
        <path d="M316 276h-79l-14 12 14 12h79Z"/>
      </g>

      <g fill="#356170" font-family="monospace" font-size="10">
        <text x="65" y="109">ACTGGTCA</text><text x="253" y="109">TGACCAGT</text>
        <text x="77" y="170">CTGGTCAA</text><text x="241" y="170">ATGACCAG</text>
        <text x="55" y="231">TGGTCAAC</text><text x="264" y="231">CATGACCA</text>
        <text x="84" y="292">GGTCAACT</text><text x="247" y="292">GCATGACC</text>
      </g>
      <g fill="#70858e" font-size="10" text-anchor="middle">
        <text x="188" y="99">insert</text><text x="188" y="160">insert</text>
        <text x="188" y="221">insert</text><text x="188" y="282">insert</text>
      </g>
    </g>

    <path d="M330 170H370" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Fixed-column pileup with a heterozygous C>T observation -->
    <g transform="translate(386 54)">
      <line x1="0" y1="24" x2="446" y2="24" stroke="#9bb0b9" stroke-width="2"/>
      <g stroke="#9bb0b9">
        <line x1="0" y1="18" x2="0" y2="30"/><line x1="112" y1="18" x2="112" y2="30"/>
        <line x1="208" y1="16" x2="208" y2="32" stroke="#b85c1e" stroke-width="2"/>
        <line x1="336" y1="18" x2="336" y2="30"/><line x1="446" y1="18" x2="446" y2="30"/>
      </g>
      <g fill="#738992" font-size="11">
        <text x="0" y="12">196281202</text><text x="174" y="12" fill="#9b4b19" font-weight="700">196281208</text><text x="382" y="12">196281214</text>
      </g>

      <g stroke="#b9cbd2" stroke-width="1">
        <rect x="0" y="48" width="320" height="28" rx="4" fill="#dcecf1"/>
        <rect x="32" y="84" width="320" height="28" rx="4" fill="#e5f2e9"/>
        <rect x="0" y="120" width="384" height="28" rx="4" fill="#dcecf1"/>
        <rect x="64" y="156" width="352" height="28" rx="4" fill="#e5f2e9"/>
        <rect x="0" y="192" width="352" height="28" rx="4" fill="#dcecf1"/>
        <rect x="32" y="228" width="384" height="28" rx="4" fill="#e5f2e9"/>
      </g>

      <rect x="194" y="40" width="28" height="224" rx="4" fill="#fff3e9" stroke="#df8b50" stroke-width="2"/>

      <g fill="#526973" font-family="monospace" font-size="12" text-anchor="middle">
        <!-- Read 1: positions 202-211, reference C at 208 -->
        <text x="16" y="67">A</text><text x="48" y="67">C</text><text x="80" y="67">T</text><text x="112" y="67">G</text><text x="144" y="67">G</text><text x="176" y="67">A</text><text x="208" y="67" fill="#0f617c" font-weight="700">C</text><text x="240" y="67">A</text><text x="272" y="67">G</text><text x="304" y="67">T</text>
        <!-- Read 2: positions 203-212, alternate T at 208 -->
        <text x="48" y="103">C</text><text x="80" y="103">T</text><text x="112" y="103">G</text><text x="144" y="103">G</text><text x="176" y="103">A</text><text x="208" y="103" fill="#b85c1e" font-weight="700">T</text><text x="240" y="103">A</text><text x="272" y="103">G</text><text x="304" y="103">T</text><text x="336" y="103">C</text>
        <!-- Read 3: positions 202-213, reference C at 208 -->
        <text x="16" y="139">A</text><text x="48" y="139">C</text><text x="80" y="139">T</text><text x="112" y="139">G</text><text x="144" y="139">G</text><text x="176" y="139">A</text><text x="208" y="139" fill="#0f617c" font-weight="700">C</text><text x="240" y="139">A</text><text x="272" y="139">G</text><text x="304" y="139">T</text><text x="336" y="139">C</text><text x="368" y="139">A</text>
        <!-- Read 4: positions 204-214, alternate T at 208 -->
        <text x="80" y="175">T</text><text x="112" y="175">G</text><text x="144" y="175">G</text><text x="176" y="175">A</text><text x="208" y="175" fill="#b85c1e" font-weight="700">T</text><text x="240" y="175">A</text><text x="272" y="175">G</text><text x="304" y="175">T</text><text x="336" y="175">C</text><text x="368" y="175">A</text><text x="400" y="175">G</text>
        <!-- Read 5: positions 202-212, alternate T at 208 -->
        <text x="16" y="211">A</text><text x="48" y="211">C</text><text x="80" y="211">T</text><text x="112" y="211">G</text><text x="144" y="211">G</text><text x="176" y="211">A</text><text x="208" y="211" fill="#b85c1e" font-weight="700">T</text><text x="240" y="211">A</text><text x="272" y="211">G</text><text x="304" y="211">T</text><text x="336" y="211">C</text>
        <!-- Read 6: positions 203-214, reference C at 208 -->
        <text x="48" y="247">C</text><text x="80" y="247">T</text><text x="112" y="247">G</text><text x="144" y="247">G</text><text x="176" y="247">A</text><text x="208" y="247" fill="#0f617c" font-weight="700">C</text><text x="240" y="247">A</text><text x="272" y="247">G</text><text x="304" y="247">T</text><text x="336" y="247">C</text><text x="368" y="247">A</text><text x="400" y="247">G</text>
      </g>

      <rect x="0" y="274" width="446" height="30" rx="4" fill="#edf1f3"/>
      <text x="-8" y="294" fill="#48606b" font-size="10" font-weight="700" text-anchor="end">REF</text>
      <g fill="#48606b" font-family="monospace" font-size="12" text-anchor="middle">
        <text x="16" y="294">A</text><text x="48" y="294">C</text><text x="80" y="294">T</text><text x="112" y="294">G</text><text x="144" y="294">G</text><text x="176" y="294">A</text><text x="208" y="294" fill="#ffffff" font-weight="700">C</text><text x="240" y="294">A</text><text x="272" y="294">G</text><text x="304" y="294">T</text><text x="336" y="294">C</text><text x="368" y="294">A</text><text x="400" y="294">G</text>
      </g>
      <circle cx="208" cy="290" r="11" fill="#b85c1e"/>
      <text x="208" y="294" fill="#ffffff" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">C</text>
      <text x="0" y="318" fill="#6b3f8c" font-size="12" font-weight="700">DP=6   AD=3,3   GT=0/1</text>
    </g>

    <path d="M874 170H922" fill="none" stroke="#78909b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- VCF document -->
    <g>
      <path d="M946 50h152l42 42v198H946Z" fill="#f8fafb" stroke="#5f7d89" stroke-width="2"/>
      <path d="M1098 50v42h42" fill="#e5edf0" stroke="#5f7d89" stroke-width="2"/>
      <g clip-path="url(#documentClip)">
        <rect x="946" y="108" width="194" height="28" fill="#e8f3f6"/>
      </g>
      <text x="966" y="80" fill="#174e62" font-size="16" font-weight="700">variants.vcf.gz</text>
      <g fill="#59707a" font-family="monospace" font-size="9.5">
        <text x="966" y="126">#CHROM POS REF ALT FILTER GT</text>
        <text x="966" y="160">3 196281208 C T PASS 0/1</text>
        <text x="966" y="190">7 55249071  G A PASS 0/1</text>
        <text x="966" y="220">17 7577121 C G PASS 0/1</text>
      </g>
      <g fill="#276749"><circle cx="1114" cy="156" r="7"/><circle cx="1114" cy="186" r="7"/><circle cx="1114" cy="216" r="7"/></g>
      <g fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1110 156l3 3 5-7"/><path d="M1110 186l3 3 5-7"/><path d="M1110 216l3 3 5-7"/>
      </g>
      <line x1="966" y1="246" x2="1118" y2="246" stroke="#c8d5da"/>
      <text x="966" y="268" fill="#6b3f8c" font-size="12" font-weight="700">fingerprinted / auditable</text>
    </g>
  </g>
</svg>

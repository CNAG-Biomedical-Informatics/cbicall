<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">mtDNA single-sample workflow</title>
  <desc id="desc">Workflow from WES BAM through mitochondrial read extraction, MToolBox, genotype/depth/heteroplasmy extraction, and final prioritized variant report.</desc>
  <rect width="960" height="260" rx="18" fill="#f8fafc"/>
  <style>
    .label{font:600 15px Arial,Helvetica,sans-serif;fill:#1f2937}
    .small{font:12px Arial,Helvetica,sans-serif;fill:#475569}
    .box{fill:#fff;stroke:#cbd5e1;stroke-width:2}
    .data{fill:#ecfdf5;stroke:#10b981}
    .tool{fill:#fff7ed;stroke:#f59e0b}
    .final{fill:#eff6ff;stroke:#2563eb}
    .line{fill:none;stroke:#64748b;stroke-width:2.3;stroke-linecap:round}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="480" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="25" font-weight="700" fill="#0f172a">mtDNA Single-Sample Workflow</text>
  <g transform="translate(42 96)">
    <rect class="data" x="0" y="0" width="128" height="66" rx="10"/>
    <text class="label" x="64" y="27" text-anchor="middle">WES BAM</text>
    <text class="small" x="64" y="48" text-anchor="middle">one sample</text>
    <rect class="box" x="168" y="0" width="128" height="66" rx="10"/>
    <text class="label" x="232" y="27" text-anchor="middle">Extract chrM</text>
    <text class="small" x="232" y="48" text-anchor="middle">MT / chrM</text>
    <rect class="box" x="336" y="0" width="128" height="66" rx="10"/>
    <text class="label" x="400" y="27" text-anchor="middle">mtDNA BAM</text>
    <text class="small" x="400" y="48" text-anchor="middle">MToolBox input</text>
    <rect class="tool" x="504" y="0" width="128" height="66" rx="10"/>
    <text class="label" x="568" y="27" text-anchor="middle">MToolBox</text>
    <text class="small" x="568" y="48" text-anchor="middle">RSRS reference</text>
    <rect class="box" x="672" y="0" width="128" height="66" rx="10"/>
    <text class="label" x="736" y="25" text-anchor="middle">Append</text>
    <text class="small" x="736" y="47" text-anchor="middle">GT / DP / HF</text>
    <rect class="final" x="840" y="0" width="128" height="66" rx="10" transform="translate(-10 0)"/>
    <text class="label" x="894" y="25" text-anchor="middle">Final report</text>
    <text class="small" x="894" y="47" text-anchor="middle">prioritized variants</text>
    <path class="line" marker-end="url(#arrow)" d="M128 33 H164"/>
    <path class="line" marker-end="url(#arrow)" d="M296 33 H332"/>
    <path class="line" marker-end="url(#arrow)" d="M464 33 H500"/>
    <path class="line" marker-end="url(#arrow)" d="M632 33 H668"/>
    <path class="line" marker-end="url(#arrow)" d="M800 33 H826"/>
  </g>
</svg>

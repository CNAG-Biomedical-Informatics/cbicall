workdir: examples/input
workflow_log: cromwell_gatk-4.6_wes_single_b37.log
run:
  parameters:
    mode: single
    pipeline: wes
    workflow_backend: cromwell
    software_stack: gatk-4.6
    resource: cbicall-germline-resources-v1
    input_dir: CNAG999_exome/CNAG99901P_ex
    qc_coverage_region: chr22
  base_dir: CNAG999_exome/CNAG99901P_ex
  run_glob: cbicall_cromwell_gatk-4.6_wes_single_b37_*
required_files:
  - log.json
  - run-report.json
  - run-report.html
  - cromwell_gatk-4.6_wes_single_b37.log
  - cbicall_cromwell.inputs.json
  - cbicall_cromwell.options.json
  - cbicall_cromwell.metadata.json
  - cbicall_cromwell.fastq_pairs.tsv
  - 02_varcall/CNAG99901P.hc.QC.vcf.gz
  - 03_stats/CNAG99901P.coverage.txt
  - 03_stats/CNAG99901P.vcf.sha256.txt
text_expectations:
  - path: 03_stats/CNAG99901P.coverage.txt
    startswith: "region\tsampleID"
    matches: "^(chr)?22\t"
json_expectations:
  - path: status
    equals: success
  - path: workflow.backend
    equals: cromwell
  - path: workflow.pipeline
    equals: wes
  - path: workflow.mode
    equals: single
  - path: workflow.software_stack
    equals: gatk-4.6
  - path: workflow.registry_version
    equals: v1
  - path: resources.bundle.key
    equals: cbicall-germline-resources-v1
  - path: run.display_genome
    equals: b37
  - path: run.qc_coverage_region
    equals: chr22
hashes:
  - name: wes_filtered_vcf
    type: normalized_vcf
    path: 02_varcall/CNAG99901P.hc.QC.vcf.gz
    pattern: ^#
    records: 6
    sha256: 621373dda8e79602e84f24b5e5082914b046c341ba64c7e15c8ce97172559baf
cleanup_paths:
  - cromwell-executions
  - cromwell-logs
  - cromwell-outputs
  - cromwell-work
